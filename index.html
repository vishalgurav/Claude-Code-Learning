<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <div class="game-info">
            <p>Current Player: <span id="current-player">X</span></p>
            <p id="game-status">Game in Progress</p>
        </div>

        <div class="game-board" id="game-board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="reset-btn" class="btn">Reset Game</button>

        <div class="game-mode">
            <h3>Game Mode</h3>
            <button id="pvp-btn" class="mode-btn active">Player vs Player</button>
            <button id="pvc-btn" class="mode-btn">Player vs Computer</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
